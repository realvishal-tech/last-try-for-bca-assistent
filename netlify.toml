# Netlify Configuration for BCA Study Hub

[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

[dev]
  port = 8888
  command = "npx http-server . -p 8888"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
