<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Study Platform - Realtime Materials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-one" aria-hidden="true"></div>
    <div class="bg-orb orb-two" aria-hidden="true"></div>

    <header class="page-header">
        <h1>BCA Study Platform</h1>
        <p>Admin can add materials and students see updates instantly, no refresh required.</p>
    </header>

    <main class="layout">
        <section class="panel admin-panel" aria-labelledby="adminTitle">
            <h2 id="adminTitle">Admin Panel</h2>
            <p class="panel-note">Add a material link under the correct semester and subject.</p>

            <form id="materialForm" class="material-form">
                <label for="semesterSelect">Semester</label>
                <select id="semesterSelect" required>
                    <option value="">Select Semester</option>
                </select>

                <label for="subjectSelect">Subject</label>
                <select id="subjectSelect" required>
                    <option value="">Select Subject</option>
                </select>

                <label for="materialUrl">Material Link (URL)</label>
                <input id="materialUrl" type="url" placeholder="https://example.com/resource" required>

                <label for="materialDesc">Description</label>
                <input id="materialDesc" type="text" placeholder="Unit 2 notes with solved examples" required>

                <button id="submitBtn" type="submit">Add Material</button>
            </form>

            <p id="adminStatus" class="status-text" aria-live="polite"></p>
        </section>

        <section class="panel user-panel" aria-labelledby="materialsTitle">
            <div class="user-panel-head">
                <h2 id="materialsTitle">Study Materials</h2>
                <span class="live-indicator">Live</span>
            </div>
            <p class="panel-note">Structure: Semester -> Subject -> Materials</p>

            <div id="loadingState" class="loading-state">Loading materials...</div>
            <div id="emptyState" class="empty-state hidden">No materials available yet.</div>
            <div id="materialsContainer" class="materials-container"></div>
        </section>
    </main>

    <!-- Firebase (compat build for simple static hosting use) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
